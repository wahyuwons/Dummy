<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WW - GTA VI Parallax Style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="smooth-wrapper">
        <section class="parallax-container">
            
            <div class="layer layer-bg" data-speed="0.2">
                <img src="https://images.unsplash.com/photo-1577717462060-e44837330743?q=80&w=2000" alt="Background">
            </div>

            <div class="layer layer-mid" data-speed="0.5">
                <h1 class="hero-title">WAHYU WONS</h1>
            </div>

            <div class="layer layer-fg" data-speed="0.8">
                <img src="https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?q=80&w=1000" alt="Foreground">
            </div>

        </section>

        <section class="content">
            <h2>Explore More</h2>
            <p>Scroll down to see the effect.</p>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
